name: flutter_riverpod_template
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # main state management use
  flutter_riverpod: ^3.3.1
  # route related
  go_router: ^17.2.1
  # payment related
  app_links: ^7.0.0
  # storage
  shared_preferences: ^2.5.5

  # api services
  dio: ^5.9.2
  http_parser: ^4.1.2
  mime: ^2.0.0
  pretty_dio_logger: ^1.4.0
  socket_io_client: ^3.1.2
  connectivity_plus: ^7.1.1

  # translator
  translator: ^1.0.4+1
  html: ^0.15.6

  # image related
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  image_picker: ^1.2.1

  # ui related
  permission_handler: ^12.0.1
  readmore: ^3.0.0
  skeletonizer: ^2.1.3
  flutter_widget_from_html_core: ^0.17.0
  cupertino_icons: ^1.0.9

  # notification related
  flutter_local_notifications: ^21.0.0
  firebase_messaging: ^16.2.0
  firebase_core: ^4.7.0
  device_info_plus: ^12.4.0
  pdf: ^3.12.0
  printing: ^5.14.3
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  http: ^1.6.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  change_app_package_name:
    ^1.5.0 # dart run change_app_package_name:main com.new.package.name
    #  if need only android --android
    #  if need only iod --ios

flutter:
  uses-material-design: true

  # local all assets
  assets:
    - assets/fonts/
    - assets/images/
    - assets/icons/

  # local all font
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Black.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
        - asset: assets/fonts/Poppins-Light.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-Regular.ttf
